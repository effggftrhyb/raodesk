<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>База знаний — RAODESK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    .article-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      box-shadow: var(--shadow-sm);
      transition: all 0.15s ease;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }
    .article-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border-medium);
      transform: translateY(-1px);
    }
    .article-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-3);
    }
    .article-card-category {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
    }
    .article-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
      line-height: 1.4;
    }
    .article-card-excerpt {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: var(--space-3);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article-card-meta {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }
    .category-filter {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-bottom: var(--space-4);
    }
    .category-filter-btn {
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-full);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .category-filter-btn:hover, .category-filter-btn.active {
      border-color: var(--primary-500);
      background: var(--primary-500);
      color: white;
    }
  </style>
</head>
<body>
  <div id="header"></div>
  <main class="app-main">
    <div class="page-container">
      <div class="page-header">
        <div class="page-header-row">
          <div>
            <h1 class="page-title">База знаний</h1>
            <p class="page-subtitle">Инструкции, FAQ и шаблоны для операторов</p>
          </div>
          <div class="page-actions">
            <a href="article-new.html" class="btn btn-primary">
              <i data-lucide="plus" style="width:18px;height:18px;"></i>
              <span>Новая статья</span>
            </a>
          </div>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:var(--space-4);">
        <div style="position:relative;">
          <i data-lucide="search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-tertiary);"></i>
          <input type="text" id="searchInput" class="form-input" placeholder="Поиск по статьям..." style="padding-left:40px;">
        </div>
      </div>
      <div class="category-filter" id="categoryFilter">
        <button class="category-filter-btn active" data-category="all">Все</button>
        <button class="category-filter-btn" data-category="Аварии">Аварии</button>
        <button class="category-filter-btn" data-category="Электрика">Электрика</button>
        <button class="category-filter-btn" data-category="Лифты">Лифты</button>
        <button class="category-filter-btn" data-category="Кровля">Кровля</button>
        <button class="category-filter-btn" data-category="Шаблоны">Шаблоны</button>
        <button class="category-filter-btn" data-category="FAQ">FAQ</button>
      </div>
      <div class="grid-2" id="articlesGrid"></div>
      <div id="emptyState" class="empty-state" style="display:none;padding:var(--space-12);">
        <div class="empty-state-icon">
          <i data-lucide="file-question" style="width:32px;height:32px;"></i>
        </div>
        <h3 class="empty-state-title">Статьи не найдены</h3>
        <p class="empty-state-text">Попробуйте изменить параметры поиска</p>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
  <script>
    if (!RAODESK.auth.checkAuth()) window.location.href = 'index.html';
    document.getElementById('header').innerHTML = RAODESK.render.header('knowledge');
    initIcons();
    
    let allArticles = RAODESK.articles.getAll();
    let currentFilter = 'all';
    let currentSearch = '';
    
    function filterAndRender() {
      let filtered = allArticles.filter(a => {
        if (currentFilter !== 'all' && a.category !== currentFilter) return false;
        if (currentSearch) {
          const s = currentSearch.toLowerCase();
          return a.title.toLowerCase().includes(s) || a.content.toLowerCase().includes(s);
        }
        return RAODESK.articles.canAccess(a);
      });
      
      const grid = document.getElementById('articlesGrid');
      const empty = document.getElementById('emptyState');
      
      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      
      empty.style.display = 'none';
      grid.innerHTML = filtered.map(a => {
        const excerpt = a.content.replace(/[#*\[\]`]/g, '').substring(0, 100) + '...';
        return `<a href="article.html?id=${a.id}" class="article-card">
          <div class="article-card-header">
            <span class="article-card-category badge badge-primary">${a.category}</span>
            ${a.visibility === 'internal' ? '<i data-lucide="lock" style="width:14px;height:14px;color:var(--warning-500);"></i>' : ''}
          </div>
          <h3 class="article-card-title">${a.title}</h3>
          <p class="article-card-excerpt">${excerpt}</p>
          <div class="article-card-meta">
            <span><i data-lucide="user" style="width:12px;height:12px;"></i> ${a.author}</span>
            <span><i data-lucide="clock" style="width:12px;height:12px;"></i> ${a.updatedAt}</span>
          </div>
        </a>`;
      }).join('');
      lucide.createIcons();
    }
    
    document.getElementById('categoryFilter').addEventListener('click', e => {
      if (e.target.classList.contains('category-filter-btn')) {
        document.querySelectorAll('.category-filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.dataset.category;
        filterAndRender();
      }
    });
    
    document.getElementById('searchInput').addEventListener('input', e => {
      currentSearch = e.target.value;
      filterAndRender();
    });
    
    filterAndRender();
  </script>
</body>
</html>
